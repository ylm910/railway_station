<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 成渝地区铁路客运智能分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 50%, #0d2137 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        .login-container {
            width: 420px;
            padding: 40px;
            background: rgba(13, 33, 55, 0.9);
            border-radius: 16px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 212, 255, 0.1);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-header .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .login-header h1 {
            color: #00d4ff;
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: #8ec5fc;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            color: #8ec5fc;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(42, 82, 152, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }
        
        .form-group input::placeholder {
            color: rgba(142, 197, 252, 0.5);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff 0%, #0066cc 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .error-msg {
            color: #ff6b8a;
            font-size: 13px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .footer-info {
            text-align: center;
            margin-top: 30px;
            color: rgba(142, 197, 252, 0.6);
            font-size: 12px;
        }
        
        /* 动画背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        
        .bg-animation span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    
    <div class="login-container">
        <div class="login-header">
            <div class="logo">🚄</div>
            <h1>成渝地区铁路客运智能分析系统</h1>
            <p>Railway Intelligent Analysis System</p>
        </div>
        
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            
            <button type="submit" class="login-btn">登 录</button>
            
            <div class="error-msg" id="errorMsg">用户名或密码错误</div>
        </form>
        
        <div class="footer-info">
            <p>默认账号: admin / admin123</p>
        </div>
    </div>
    
    <script>
        // 创建背景动画粒子
        function createParticles() {
            const bg = document.getElementById('bgAnimation');
            for (let i = 0; i < 50; i++) {
                const span = document.createElement('span');
                span.style.left = Math.random() * 100 + '%';
                span.style.animationDelay = Math.random() * 15 + 's';
                span.style.animationDuration = (10 + Math.random() * 10) + 's';
                bg.appendChild(span);
            }
        }
        createParticles();
        
        // 登录处理
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    // 登录成功，保存token并跳转
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('username', result.data.username);
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = result.message || '用户名或密码错误';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                errorMsg.textContent = '登录失败，请稍后重试';
                errorMsg.classList.add('show');
            }
            
            return false;
        }
    </script>
</body>
</html>
